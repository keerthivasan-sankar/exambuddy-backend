<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExamBuddy - Multi-User Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 800px;
        }
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 20px 20px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-header h2 { font-size: 1.5rem; }
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        .message {
            margin-bottom: 20px;
            display: flex;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.own { justify-content: flex-end; }
        .message-content {
            max-width: 60%;
            background: white;
            padding: 12px 16px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .message.own .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .message-sender {
            font-weight: 700;
            font-size: 0.85rem;
            color: #666;
        }
        .message.own .message-sender { color: rgba(255,255,255,0.7); }
        .message-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 8px;
            margin: 8px 0;
            cursor: pointer;
        }
        .message-time {
            font-size: 0.75rem;
            color: #999;
            margin-top: 4px;
        }
        .message.own .message-time { color: rgba(255,255,255,0.6); }
        .input-area {
            padding: 15px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }
        .input-buttons { display: flex; gap: 8px; }
        .input-btn {
            width: 44px; height: 44px;
            border: none;
            background: #f0f0f0;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.3rem;
        }
        .input-btn:hover { background: #667eea; color: white; }
        #chatInput {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 25px;
        }
        .send-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }
        input[type="file"] { display: none; }
        .message.system { justify-content: center; }
        .message.system .message-content {
            background: #e0e0e0;
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="chat-header">
            <div>
                <h2>🚌 ExamBuddy Chat</h2>
                <div style="font-size:0.9rem;opacity:0.9;" id="userDisplay">User: Loading...</div>
            </div>
            <div>👥 <span id="onlineCount">0</span> online</div>
        </div>
        
        <div class="chat-area" id="chatArea">
            <div class="message system">
                <div class="message-content">Loading messages...</div>
            </div>
        </div>
        
        <div class="input-area">
            <div class="input-buttons">
                <button class="input-btn" onclick="document.getElementById('imageInput').click()">📷</button>
                <button class="input-btn" onclick="document.getElementById('videoInput').click()">🎥</button>
            </div>
            <input type="text" id="chatInput" placeholder="Type message..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="send-btn" onclick="sendMessage()">Send</button>
            <input type="file" id="imageInput" accept="image/*">
            <input type="file" id="videoInput" accept="video/*">
        </div>
    </div>

    <script>
        // ========== USER SETUP ==========
        const API_URL = 'http://localhost:5000/api';
        let currentUser = localStorage.getItem('chatUserName') || null;
        let messageInterval = null;

        if (!currentUser) {
            let name = prompt('Enter your name:', 'Traveler');
            if (name && name.trim()) {
                currentUser = name.trim();
                localStorage.setItem('chatUserName', currentUser);
            } else {
                currentUser = 'Traveler';
            }
        }
        document.getElementById('userDisplay').innerText = 'User: ' + currentUser;

        // ========== CLOUDINARY ==========
        const CLOUD_NAME = 'dyxoualgf';
        const UPLOAD_PRESET = 'exambuddy_preset';

        // ========== LOAD MESSAGES ==========
        async function loadMessages() {
            try {
                const response = await fetch(API_URL + '/messages');
                if (!response.ok) throw new Error('Failed to load messages');
                const messages = await response.json();
                displayMessages(messages);
            } catch (error) {
                console.error('Load error:', error);
                // Show error but keep trying
            }
        }

        // ========== DISPLAY MESSAGES ==========
        function displayMessages(messages) {
            const chatArea = document.getElementById('chatArea');
            chatArea.innerHTML = '';

            if (messages.length === 0) {
                chatArea.innerHTML = `<div class="message system"><div class="message-content">No messages yet. Say hello!</div></div>`;
                return;
            }

            messages.forEach(msg => {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${msg.user === currentUser ? 'own' : ''}`;

                let content = `<div class="message-content">`;
                content += `<div class="message-sender">${escapeHtml(msg.user)}</div>`;

                if (msg.type === 'text') {
                    content += `<div>${escapeHtml(msg.content)}</div>`;
                } else if (msg.type === 'image') {
                    content += `<img src="${msg.content}" class="message-image" onclick="window.open('${msg.content}')">`;
                } else if (msg.type === 'video') {
                    content += `<video controls style="max-width:200px;max-height:200px;"><source src="${msg.content}"></video>`;
                }

                const time = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString() : 'Just now';
                content += `<div class="message-time">${time}</div>`;
                content += `</div>`;
                messageDiv.innerHTML = content;
                chatArea.appendChild(messageDiv);
            });

            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // ========== SEND MESSAGE ==========
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;

            try {
                const response = await fetch(API_URL + '/messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user: currentUser,
                        type: 'text',
                        content: text
                    })
                });

                if (!response.ok) throw new Error('Failed to send');
                input.value = '';
                loadMessages(); // Refresh messages
            } catch (error) {
                alert('Failed to send: ' + error.message);
            }
        }

        // ========== UPLOAD IMAGE/VIDEO ==========
        async function uploadToCloudinary(file, type) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', UPLOAD_PRESET);
            formData.append('folder', 'exambuddy');

            const endpoint = type === 'video' ? 'video' : 'image';
            const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/${endpoint}/upload`, {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            if (!response.ok) throw new Error(data.error?.message || 'Upload failed');
            return data.secure_url;
        }

        // Image upload handler
        document.getElementById('imageInput').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;
            if (file.size > 5 * 1024 * 1024) {
                alert('Image too large (max 5MB)');
                this.value = '';
                return;
            }

            try {
                const url = await uploadToCloudinary(file, 'image');
                const response = await fetch(API_URL + '/messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user: currentUser,
                        type: 'image',
                        content: url
                    })
                });
                if (!response.ok) throw new Error('Failed to save');
                loadMessages();
            } catch (error) {
                alert('Upload failed: ' + error.message);
            }
            this.value = '';
        });

        // Video upload handler
        document.getElementById('videoInput').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;
            if (file.size > 20 * 1024 * 1024) {
                alert('Video too large (max 20MB)');
                this.value = '';
                return;
            }

            try {
                const url = await uploadToCloudinary(file, 'video');
                const response = await fetch(API_URL + '/messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user: currentUser,
                        type: 'video',
                        content: url
                    })
                });
                if (!response.ok) throw new Error('Failed to save');
                loadMessages();
            } catch (error) {
                alert('Upload failed: ' + error.message);
            }
            this.value = '';
        });

        // ========== UTILITIES ==========
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ========== AUTO-REFRESH ==========
        // Load messages every 3 seconds (polling)
        setInterval(loadMessages, 3000);

        // ========== INITIALIZE ==========
        loadMessages();

        // Update online count
        document.getElementById('onlineCount').innerText = '1';
    </script>
</body>
</html>
